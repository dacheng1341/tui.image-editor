<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>VectorSlice - 高级向量切片与图片编辑器 | 大程开源百宝箱</title>
    <meta name="description" content="VectorSlice 是一款开源的在线图片编辑器与高级向量切片工具，支持图片裁剪、滤镜、文本、图层管理以及类似Figma的矢量形状透明切片导出功能。由大程开源百宝箱提供。">
    <meta name="keywords" content="VectorSlice, 在线图片编辑, 向量切片, 图片裁剪, tui.image-editor, 大程开源百宝箱, dacbbox">
    <link
      type="text/css"
      href="https://uicdn.toast.com/tui-color-picker/v2.2.6/tui-color-picker.css"
      rel="stylesheet"
    />
    <link type="text/css" href="../dist/tui-image-editor.css" rel="stylesheet" />
    <style>
      @import url(http://fonts.googleapis.com/css?family=Noto+Sans);
      html,
      body {
        height: 100%;
        margin: 0;
      }
      .custom-nav-panel {
        position: absolute;
        top: 70px;
        right: 20px;
        z-index: 1000;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .custom-nav-btn {
        background: #00a9ff;
        color: #fff;
        padding: 10px 15px;
        text-decoration: none;
        border-radius: 6px;
        font-family: 'Noto Sans', sans-serif;
        font-weight: bold;
        font-size: 14px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        transition: background 0.2s, transform 0.1s;
        text-align: center;
      }
      .custom-nav-btn:hover {
        background: #008cd4;
        transform: translateY(-2px);
      }
      .custom-nav-btn.btn-main {
        background: #ff5722;
      }
      .custom-nav-btn.btn-main:hover {
        background: #e64a19;
      }
      .custom-nav-btn.btn-lang {
        background: #4caf50;
      }
      .custom-nav-btn.btn-lang:hover {
        background: #388e3c;
      }
      
      /* Hide default logo and add text logo */
      .tui-image-editor-header-logo img {
        display: none !important;
      }
      .tui-image-editor-header-logo {
        display: flex !important;
        align-items: center;
      }
      .tui-image-editor-header-logo::after {
        content: attr(data-logo-text);
        color: white;
        font-size: 20px;
        font-weight: bold;
        font-family: 'Noto Sans', sans-serif;
        letter-spacing: 1px;
      }
    </style>
  </head>
  <body>
    <div class="custom-nav-panel">
      <button id="btn-toggle-lang" class="custom-nav-btn btn-lang"></button>
      <a href="example04-slice.html" class="custom-nav-btn">➡️ 进入切片模式 (Slice Mode)</a>
      <a href="https://dacbbox.com" target="_blank" class="custom-nav-btn btn-main">🏠 大程开源百宝箱 (dacbbox.com)</a>
    </div>
    <div id="tui-image-editor-container"></div>
    <script
      type="text/javascript"
      src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/4.4.0/fabric.js"
    ></script>
    <script
      type="text/javascript"
      src="https://uicdn.toast.com/tui.code-snippet/v1.5.0/tui-code-snippet.min.js"
    ></script>
    <script
      type="text/javascript"
      src="https://uicdn.toast.com/tui-color-picker/v2.2.6/tui-color-picker.js"
    ></script>
    <script
      type="text/javascript"
      src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/1.3.3/FileSaver.min.js"
    ></script>
    <script type="text/javascript" src="../dist/tui-image-editor.js"></script>
    <script type="text/javascript" src="js/theme/white-theme.js"></script>
    <script type="text/javascript" src="js/theme/black-theme.js"></script>
    <script type="text/javascript" src="js/theme/locale_zh.js"></script>
    <script>
      var currentLang = localStorage.getItem('tui-editor-lang') || 'zh';
      var btnLang = document.getElementById('btn-toggle-lang');
      
      if (currentLang === 'zh') {
          btnLang.innerText = '🇬🇧 Switch to English';
      } else {
          btnLang.innerText = '🇨🇳 切换至中文';
      }
      
      btnLang.addEventListener('click', function() {
          localStorage.setItem('tui-editor-lang', currentLang === 'zh' ? 'en' : 'zh');
          location.reload();
      });

      var editorOptions = {
        includeUI: {
          loadImage: {
            path: 'img/sampleImage2.png',
            name: 'SampleImage',
          },
          theme: blackTheme, 
          initMenu: 'filter',
          menuBarPosition: 'bottom',
        },
        cssMaxWidth: 700,
        cssMaxHeight: 500,
        usageStatistics: false,
      };
      
      if (currentLang === 'zh') {
          editorOptions.includeUI.locale = locale_zh;
      }
      
      var imageEditor = new tui.ImageEditor('#tui-image-editor-container', editorOptions);

      // Set custom text logo
      var logoWrapper = document.querySelector('.tui-image-editor-header-logo');
      if (logoWrapper) {
          logoWrapper.setAttribute('data-logo-text', currentLang === 'zh' ? '图片编辑' : 'Image Editor');
      }

      window.onresize = function () {
        imageEditor.ui.resizeEditor();
      };
    </script>
  </body>
</html>
